<!DOCTYPE html>
<html>
<head>
    <title>Student Performance</title>
</head>

<body>
<div class="login">
    <h1>Student Exam Performance Indicator</h1>

    <form action="{{ url_for('predict_datapoint') }}" method="POST">

        <label>Gender</label>
        <select name="gender" required>
            <option disabled selected value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select><br><br>

        <label>Race or Ethnicity</label>
        <select name="ethnicity" required>
            <option disabled selected value="">Select</option>
            <option value="group_a">Group A</option>
            <option value="group_b">Group B</option>
            <option value="group_c">Group C</option>
            <option value="group_d">Group D</option>
            <option value="group_e">Group E</option>
        </select><br><br>

        <label>Parental Education</label>
        <select name="parental_level_of_education" required>
            <option disabled selected value="">Select</option>
            <option value="associate's degree">Associate's Degree</option>
            <option value="bachelor's degree">Bachelor's Degree</option>
            <option value="high school">High School</option>
            <option value="master's degree">Master's Degree</option>
            <option value="some college">Some College</option>
            <option value="some high school">Some High School</option>
        </select><br><br>

        <label>Lunch</label>
        <select name="lunch" required>
            <option disabled selected value="">Select</option>
            <option value="free/reduced">Free/Reduced</option>
            <option value="standard">Standard</option>
        </select><br><br>

        <label>Test Preparation</label>
        <select name="test_preparation_course" required>
            <option disabled selected value="">Select</option>
            <option value="none">None</option>
            <option value="completed">Completed</option>
        </select><br><br>

        <label>Reading Score</label>
        <input type="number" name="reading_score" min="0" max="100" required><br><br>

        <label>Writing Score</label>
        <input type="number" name="writing_score" min="0" max="100" required><br><br>

        <input type="submit" value="Predict the Math Score">

    </form>

    {% if results %}
        <h2>Prediction: {{ results }}</h2>
    {% endif %}

</div>
</body>
</html>
