<html>
    <body>
        <div class='login'>
            <h1>Student Exam Performance Indicator</h1>

            <form action="{{url_for{'predict_datapoint'}}}",method=POST>
                <h1>
                    <legend>Student Exam Performance Indicator</legend>
                </h1>
                <div> class = 'mb-3'>
                    <label class="form-label">Gender</label>
                    <select class="form-control' name='gender',placeholder='Enter Gender' required>
                        <option class="placeholder" selected disabled value="">Select Gender</option>
                        <option value="male">
                            Male
                        </option>
                        <option value="female">
                            Female
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Race or Ethnicity</label>
                    <select class="form-control" id="ethnicity" placeholder="Enter Your Ethnicity "> 
                      <option class="placeholder" selected disabled value="">Select Race or Ethnicity</option>
                      <option value="group_a">
                        Group A
                      </option>
                      <option value="group_b">
                        Group B
                      </option>
                      <option value="group_c">
                        Group C
                      </option>
                      <option value="group_d">
                        Group D
                      </option>
                      <option value="group_e">
                        Group E
                      </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Parental Level of Education</label>
                    <select class="form-control" id="parental_level" placeholder="Enter Your Parental Level of Education"> 
                      <option class="placeholder" selected disabled value="">Select Parental Level of Education</option>
                      <option value="associate's degree">
                        Associate's Degree
                      </option>
                      <option value="bachelor's degree">
                        Bachelor's Degree
                      </option>
                      <option value="high school">
                        High School
                      </option>
                      <option value="master's degree">
                        Master's Degree
                      </option>
                      <option value="some college">
                        Some College
                      </option>
                      <option value="some high school">
                        Some High School
                      </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Lunch</label>
                    <select class="form_control" id="lunch" placeholder="Enter your Lunch">
                        <option class="placeholder" selected disabled value="">Select Lunch</option>
                        <option value="free/reduced">
                            Free/Reduced
                        </option>
                        <option value="standard">
                            Standard
                        </option>
                    </select>
                </div>
                   <div class="mb-3">
            <label class="form-label">Test preparation Course</label>
            <select class="form-control" name="test_preparation_course" placeholder="Enter you Course"
                required>
                <option class="placeholder" selected disabled value="">Select Test_course</option>
                <option value="none">
                    None
                </option>
                <option value="completed">
                    Completed
                </option>
            </select>
        </div>
         <div class="mb-3">
            <label class="form-label">Test preparation Course</label>
            <select class="form-control" name="test_preparation_course" placeholder="Enter you Course"
                required>
                <option class="placeholder" selected disabled value="">Select Test_course</option>
                <option value="none">
                    None
                </option>
                <option value="completed">
                    Completed
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Writing Score out of 100</label>
            <input class="form-control" type="number" name="reading_score"
                placeholder="Enter your Reading score" min='0' max='100' />
        </div>
        <div class="mb-3">
            <label class="form-label">Reading Score out of 100</label>
            <input class="form-control" type="number" name="writing_score"
                placeholder="Enter your Reading Score" min='0' max='100' />
        </div>
        <div class="mb-3">
            <input class="btn btn-primary" type="submit" value="Predict your Maths Score" required />
        </div>
            </form>
        </div>
    </div>
    <h2>
       THE  prediction is {{results}}
    </h2>
    </body>
</html>
